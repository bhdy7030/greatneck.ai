name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: askmura
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: askmura
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports
        run: python -c "from main import app; print('Imports OK')"
        env:
          DATABASE_URL: postgresql://askmura:testpass@localhost:5432/askmura
          JWT_SECRET: ci-test-secret

      - name: Run tests (including golden-set LLM routing)
        run: python -m pytest tests/ -m "" -v
        env:
          DATABASE_URL: postgresql://askmura:testpass@localhost:5432/askmura
          JWT_SECRET: ci-test-secret
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

